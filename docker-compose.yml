services:
  mariadb:
    image: mariadb:10.6
    container_name: mariadb-correos
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MARIADB_HOST_PORT:-13306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - correos-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mongodb:
    # mongo:5.0+ (incl. 7.0) requiere CPU con AVX; esta máquina no lo tiene
    # (SIGILL/exit 132). 4.4 es la última versión que arranca sin AVX.
    image: mongo:4.4
    container_name: mongodb-correos
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    ports:
      - "${MONGODB_HOST_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - correos-network
    healthcheck:
      # mongo:4.4 trae el shell "mongo" (no "mongosh")
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis-correos
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - correos-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi-correos
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mariadb:3306/${MYSQL_DATABASE}
      - MONGODB_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DATABASE}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # --- Fase 3: admin semilla, invitaciones y SMTP ---
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - APP_PUBLIC_URL=${APP_PUBLIC_URL}
      - INVITATION_EXPIRE_DAYS=${INVITATION_EXPIRE_DAYS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
    ports:
      - "${BACKEND_HOST_PORT:-18080}:8000"
    depends_on:
      mariadb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - correos-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-correos
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_HOST_PORT:-18080}
    ports:
      - "${FRONTEND_HOST_PORT:-15173}:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - correos-network
    command: npm run dev

  n8n:
    image: n8nio/n8n
    container_name: n8n-correos
    # Las versiones actuales de n8n solo soportan sqlite o postgresdb (ya NO mysql).
    # Como n8n aquí solo actúa de disparador, usamos SQLite (por defecto),
    # persistido en el volumen n8n_data. El entrypoint por defecto arranca n8n
    # (no hay que pasar "command: n8n start").
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - GENERIC_TIMEZONE=${TIMEZONE}
    ports:
      - "${N8N_HOST_PORT:-15678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/workflows
    networks:
      - correos-network

volumes:
  mariadb_data:
  mongodb_data:
  redis_data:
  n8n_data:

networks:
  correos-network:
    driver: bridge
